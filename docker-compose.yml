version: '3.8'

services:
  suministros-front:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - VITE_BASE_API_URL=${VITE_BASE_API_URL:-http://localhost:8000/}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.suministros-front.rule=Host(`localhost`)"
      - "traefik.http.services.suministros-front.loadbalancer.server.port=80"
